name: Bug report
description: Report a problem with Fsm_LogViewer
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security issues, follow [SECURITY.md](../../SECURITY.md) instead of opening a public issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: magento
    attributes:
      label: Magento / Mage-OS version
      placeholder: e.g. Mage-OS 1.3 / Magento 2.4.7
    validations:
      required: true

  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: e.g. 8.2.18
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: Module version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant `var/log` excerpts or screenshots (redact secrets)
    validations:
      required: false
